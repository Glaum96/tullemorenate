<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Renate 30 År | QR Kort</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--bg-primary);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 2rem;
        }

        :root {
            --bg-primary: #0d0d1a;
            --text-primary: #f5f5f5;
            --text-muted: #b0b0c0;
            --gold: #c9a84c;
            --gold-light: #e8c97a;
        }

        .card-container {
            background: linear-gradient(135deg, #1a1a35 0%, #2a2050 100%);
            border-radius: 16px;
            padding: 3rem 2rem;
            max-width: 500px;
            width: 100%;
            text-align: center;
            box-shadow:
                0 20px 60px rgba(201, 168, 76, 0.2),
                0 0 80px rgba(232, 201, 122, 0.1);
            border: 2px solid rgba(201, 168, 76, 0.2);
        }

        .header {
            margin-bottom: 2.5rem;
        }

        .heart {
            font-size: 2.5rem;
            margin-bottom: 1rem;
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% {
                transform: scale(1);
                opacity: 1;
            }
            50% {
                transform: scale(1.1);
                opacity: 0.8;
            }
        }

        h1 {
            font-size: 2rem;
            font-weight: 900;
            background: linear-gradient(
                135deg,
                #f5e6c8,
                var(--gold-light),
                var(--gold)
            );
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 0.5rem;
            font-style: italic;
        }

        .subtitle {
            color: var(--text-muted);
            font-size: 1rem;
            font-style: italic;
        }

        .gold-divider {
            width: 80px;
            height: 1px;
            background: linear-gradient(
                90deg,
                transparent,
                var(--gold-light),
                transparent
            );
            margin: 2rem auto;
        }

        .qr-section {
            margin-bottom: 2.5rem;
        }

        #qrcode {
            display: flex;
            justify-content: center;
            margin-bottom: 2rem;
        }

        #qrcode img {
            background: white;
            padding: 1rem;
            border-radius: 8px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }

        .scan-text {
            color: var(--text-muted);
            font-size: 0.95rem;
            margin-bottom: 1.5rem;
            font-style: italic;
        }

        .password-section {
            background: rgba(232, 201, 122, 0.05);
            border: 2px solid rgba(201, 168, 76, 0.3);
            border-radius: 12px;
            padding: 1.5rem;
            margin-bottom: 2rem;
        }

        .password-label {
            color: var(--gold);
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.2em;
            margin-bottom: 0.8rem;
            font-weight: 600;
        }

        .password-display {
            background: rgba(13, 13, 26, 0.6);
            border: 1px solid rgba(201, 168, 76, 0.2);
            border-radius: 8px;
            padding: 1rem;
            font-family: 'Monaco', 'Menlo', monospace;
            font-size: 1.8rem;
            letter-spacing: 0.1em;
            color: var(--gold-light);
            font-weight: 700;
        }

        .footer-text {
            color: var(--text-muted);
            font-size: 0.9rem;
            line-height: 1.6;
        }

        .footer-text strong {
            color: var(--gold);
        }

        .url {
            color: var(--gold-light);
            word-break: break-all;
            font-size: 0.85rem;
        }

        /* Print Styles */
        @media print {
            body {
                background: white;
                padding: 0;
            }

            .card-container {
                box-shadow: none;
                max-width: 100%;
                padding: 2rem;
                background: white;
                border: 1px solid #ddd;
            }

            h1 {
                -webkit-text-fill-color: unset;
                background: unset;
                color: #c0392b;
            }

            .heart {
                animation: none;
                opacity: 1;
            }

            .password-display {
                background: #f5f5f5;
                border: 1px solid #ccc;
                color: #c0392b;
            }

            #qrcode img {
                box-shadow: none;
                border: 1px solid #ccc;
            }
        }
    </style>
</head>
<body>
    <div class="card-container">
        <div class="header">
            <div class="heart">♡</div>
            <h1>Renate</h1>
            <p class="subtitle">30 År</p>
        </div>

        <div class="gold-divider"></div>

        <div class="qr-section">
            <p class="scan-text">Scan QR-koden for å besøke bursdagssiden din</p>
            <div id="qrcode"></div>
        </div>

        <div class="password-section">
            <div class="password-label">Passord til siden:</div>
            <div class="password-display">cleanboy30</div>
        </div>

        <div class="footer-text">
            <p>Til deg. Gratulerer med dagen din. Laget med kjærlighet 💕</p>
            <p style="margin-top: 0.8rem;">
                <strong>tullemorenate.no</strong>
            </p>
        </div>
    </div>

    <script>
        // Generate QR code
        new QRCode(document.getElementById("qrcode"), {
            text: "https://tullemorenate.no",
            width: 250,
            height: 250,
            colorDark: "#000000",
            colorLight: "#ffffff",
            correctLevel: QRCode.CorrectLevel.H
        });
    </script>
</body>
</html>
